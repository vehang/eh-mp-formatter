server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 代理状态检测端点（前端据此判断是否 Docker 环境）
    location = /api/proxy-status {
        default_type application/json;
        return 200 '{"proxy":true}';
    }

    # FreeImage CORS 代理（FreeImage 不支持 CORS）
    location /api/freeimage/ {
        proxy_pass https://freeimage.host/;
        proxy_set_header Host freeimage.host;
        proxy_set_header Accept "*/*";
        proxy_ssl_server_name on;
    }

    # Lewd.pics CORS 代理（不支持 CORS）
    location /api/lewd/ {
        proxy_pass https://lewd.pics/;
        proxy_set_header Host lewd.pics;
        proxy_set_header Accept "*/*";
        proxy_ssl_server_name on;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
}
