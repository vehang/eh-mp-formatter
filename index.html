<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>排版助手 - 公众号 Markdown 排版工具</title>
    <!-- 缓存版本检查和主题初始化 -->
    <script>
      (function() {
        var CACHE_VERSION = '1.0';
        
        try {
          // 检查缓存版本
          var versionKey = 'mp-formatter-cache-version';
          var currentVersion = localStorage.getItem(versionKey);
          
          if (currentVersion !== CACHE_VERSION) {
            // 版本不匹配，清除所有缓存
            console.log('[Cache] Version mismatch, clearing all cache');
            var keysToRemove = [];
            for (var i = 0; i < localStorage.length; i++) {
              var key = localStorage.key(i);
              if (key && key.startsWith('mp-formatter-')) {
                keysToRemove.push(key);
              }
            }
            keysToRemove.forEach(function(key) {
              localStorage.removeItem(key);
            });
            // 设置新版本号
            localStorage.setItem(versionKey, CACHE_VERSION);
          }
          
          // 设置主题
          var stored = localStorage.getItem('mp-formatter-ui-theme');
          var theme = 'dark';
          if (stored === 'light') {
            theme = 'light';
          } else if (stored === 'dark') {
            theme = 'dark';
          } else if (stored === 'system' || !stored) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <!-- Iconify 图标库 -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <!-- Google Fonts: 思源黑体 + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
