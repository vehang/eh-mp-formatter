<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>排版助手 - 公众号 Markdown 排版工具</title>
    <!-- 清除 Iconify 缓存 + 应用缓存版本检查 + 主题初始化 -->
    <script>
      (function() {
        try {
          // 【重要】每次都清除 Iconify 缓存，避免版本冲突
          // Iconify 3.x 检测到 iconify2 的缓存时会尝试加载不兼容的数据
          var iconifyKeys = [];
          for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && (
              key === 'iconify-version' ||
              key.startsWith('iconify-') ||
              key.includes('iconify')
            )) {
              iconifyKeys.push(key);
            }
          }
          if (iconifyKeys.length > 0) {
            console.log('[Iconify] Clearing old cache:', iconifyKeys);
            iconifyKeys.forEach(function(key) {
              localStorage.removeItem(key);
            });
          }
          
          // 检查应用缓存版本
          var CACHE_VERSION = '2.0';
          var versionKey = 'mp-formatter-cache-version';
          var currentVersion = localStorage.getItem(versionKey);
          
          if (currentVersion !== CACHE_VERSION) {
            console.log('[Cache] Version mismatch, clearing app cache');
            var keysToRemove = [];
            for (var i = 0; i < localStorage.length; i++) {
              var key = localStorage.key(i);
              if (key && key.startsWith('mp-formatter-')) {
                keysToRemove.push(key);
              }
            }
            keysToRemove.forEach(function(key) {
              localStorage.removeItem(key);
              console.log('[Cache] Removed:', key);
            });
            localStorage.setItem(versionKey, CACHE_VERSION);
            console.log('[Cache] Updated to version', CACHE_VERSION);
          }
          
          // 设置主题
          var stored = localStorage.getItem('mp-formatter-ui-theme');
          var theme = 'dark';
          if (stored === 'light') {
            theme = 'light';
          } else if (stored === 'dark') {
            theme = 'dark';
          } else if (stored === 'system' || !stored) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          console.error('[Init] Error:', e);
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <!-- Iconify 图标库 -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <!-- Google Fonts: 思源黑体 + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
