<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>排版助手 - 公众号 Markdown 排版工具</title>
    <!-- 防止主题闪烁：在 CSS 加载前设置 data-theme -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('mp-formatter-ui-theme');
          var theme = 'dark'; // 默认深色
          if (stored === 'light') {
            theme = 'light';
          } else if (stored === 'dark') {
            theme = 'dark';
          } else if (stored === 'system' || !stored) {
            // 跟随系统
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          // localStorage 不可用时使用默认深色主题
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <!-- Iconify 图标库 -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <!-- Google Fonts: 思源黑体 + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
