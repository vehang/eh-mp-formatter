services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HERMES_VERSION: main
    container_name: hermes
    restart: unless-stopped
    volumes:
      - hermes-data:/opt/data
      # 挂载自定义配置（可选）
      # - ./config.yaml:/opt/data/config.yaml
      # - ./.env:/opt/data/.env
      # - ./SOUL.md:/opt/data/SOUL.md
    ports:
      - "8080:8080"  # Gateway Web 端口（按需开启）
    environment:
      - TZ=Asia/Shanghai
    # 默认启动 gateway，改为 CLI 模式去掉 "gateway start"
    command: gateway start

volumes:
  hermes-data:
    driver: local
